name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os_name: windows
            archive_ext: zip
          - runner: ubuntu-latest
            os_name: linux
            archive_ext: tar.gz
          - runner: macos-latest
            os_name: macos
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build binaries on Windows
        if: matrix.os_name == 'windows'
        shell: powershell
        run: |
          pyinstaller .\cc-usage-reporter.spec
          pyinstaller .\cc-usage-reporter-gui.spec
          python -m cc_usage_reporter release-pack

      - name: Build binaries on Linux and macOS
        if: matrix.os_name != 'windows'
        shell: bash
        run: |
          pyinstaller cc-usage-reporter.spec
          pyinstaller cc-usage-reporter-gui.spec
          python -m cc_usage_reporter release-pack

      - name: Rename packaged artifact
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import shutil
          from cc_usage_reporter import __version__

          root = pathlib.Path("release")
          dirs = sorted([p for p in root.iterdir() if p.is_dir()], key=lambda p: p.stat().st_mtime, reverse=True)
          if not dirs:
              raise SystemExit("no release directory found")
          release_dir = dirs[0]

          dist_files = sorted(release_dir.parent.glob(f"{release_dir.name}.*"), key=lambda p: p.stat().st_mtime, reverse=True)
          candidates = [p for p in dist_files if p.name.endswith(".zip") or p.name.endswith(".tar.gz")]
          if not candidates:
              raise SystemExit("no packaged artifact found")

          suffix = ".zip" if "${{ matrix.archive_ext }}" == "zip" else ".tar.gz"
          source = next((p for p in candidates if p.name.endswith(suffix)), candidates[0])
          tag = os.environ.get("GITHUB_REF_NAME", f"v{__version__}")
          target = root / f"cc-usage-reporter-{tag}-${{ matrix.os_name }}{suffix}"
          shutil.copy2(source, target)
          print(target)
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-usage-reporter-${{ matrix.os_name }}
          path: release/cc-usage-reporter-v*-${{ matrix.os_name }}.*
          if-no-files-found: error

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CC Usage Reporter ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/cc-usage-reporter-windows/*
            artifacts/cc-usage-reporter-linux/*
            artifacts/cc-usage-reporter-macos/*
